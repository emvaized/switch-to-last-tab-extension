<!DOCTYPE html>
<html>
<head>
  <title>Switch to Last Tab Options</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 10px; }
    label { display: block; margin-bottom: 10px; }
    input { margin-right: 10px; }
  </style>
</head>
<body>
  <!-- <h2>Switch to Last Tab Options</h2> -->
  <form id="optionsForm">
    <label>
      <input type="checkbox" id="changeIcon">
      Change icon on toolbar icon click
    </label>
    <label>
      <input type="checkbox" id="changeBadge">
      Show badge on toolbar icon click
    </label>
    <label>
      <input type="checkbox" id="activateOnClose">
      Switch to last tab on tab close
    </label>
    <button type="submit">Save</button>
  </form>
  <script src="options.js"></script>
</body>
</html>
